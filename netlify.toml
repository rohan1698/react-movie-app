# Vite build → static output in dist/. Vite emits external module scripts (no
# inline <script>), so the CSP can keep script-src 'self' without 'unsafe-inline'.
[build]
  command = "npm run build"
  publish = "dist"

# Vite 8 / @vitejs/plugin-react 6 require Node 20.19+/22; pin it so the build
# environment matches local and never falls back to an older default.
[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# TMDB API proxy — injects the api_key server-side. MUST precede the SPA
# catch-all so /api/tmdb/* hits the function instead of index.html.
[[redirects]]
  from = "/api/tmdb/*"
  to = "/.netlify/functions/tmdb/:splat"
  status = 200

# SPA client-side routing fallback.
[[redirects]]
  from = "*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://image.tmdb.org; connect-src 'self'; frame-src https://www.youtube.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
